# Flujo de CI/CD para ejecutar pruebas automáticamente y desplegar en Google Cloud Run según la rama
# Corre tests en pushes a develop y main, y despliega a DEV o PROD dependiendo del branch
name: Joli Backend CI/CD

on:
  push:
    branches:
      - develop
      - main

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
      GOOGLE_MAPS_PLACE_ID: ${{ secrets.GOOGLE_MAPS_PLACE_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npx jest --runInBand --verbose 


  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Autenticarse con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/732206415367/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-deploy@dotted-ranger-489116-c6.iam.gserviceaccount.com

      - name: Instalar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy DEV
        if: github.ref == 'refs/heads/develop'
        run: |
          gcloud run deploy joli-dev \
            --source . \
            --region northamerica-south1 \
            --platform managed \
            --allow-unauthenticated

      - name: Deploy PROD
        if: github.ref == 'refs/heads/main'
        run: |
          gcloud run deploy joli-prod \
            --source . \
            --region northamerica-south1 \
            --platform managed \
            --allow-unauthenticated